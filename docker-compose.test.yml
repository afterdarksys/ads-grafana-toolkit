version: '3.8'

services:
  # Complete test environment with Grafana + Prometheus + toolkit
  grafana-toolkit-test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: grafana-toolkit-test
    ports:
      - "3000:3000"   # Grafana
      - "9090:9090"   # Prometheus
      - "9100:9100"   # Node Exporter
    volumes:
      - grafana-test-data:/var/lib/grafana
      - prometheus-test-data:/var/lib/prometheus
      - ./:/opt/ads-grafana-toolkit
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    privileged: true  # For systemctl and process management
    restart: unless-stopped
    networks:
      - monitoring-test

  # Standalone Grafana for toolkit testing (Docker method)
  grafana-docker:
    image: grafana/grafana:latest
    container_name: grafana-toolkit-docker
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-docker-data:/var/lib/grafana
    networks:
      - monitoring-test

  # Prometheus for testing
  prometheus-standalone:
    image: prom/prometheus:latest
    container_name: prometheus-standalone
    ports:
      - "9091:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - ./test/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-standalone-data:/prometheus
    networks:
      - monitoring-test

  # MySQL for testing datasource detection
  mysql-test:
    image: mysql:8.0
    container_name: mysql-toolkit-test
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=testpassword
      - MYSQL_DATABASE=grafana
      - MYSQL_USER=grafana
      - MYSQL_PASSWORD=grafana
    volumes:
      - mysql-test-data:/var/lib/mysql
    networks:
      - monitoring-test

  # Graphite for testing
  graphite-test:
    image: graphiteapp/graphite-statsd:latest
    container_name: graphite-toolkit-test
    ports:
      - "8080:80"      # Graphite web
      - "2003:2003"    # Carbon line receiver
      - "2004:2004"    # Carbon pickle receiver
      - "8125:8125/udp" # StatsD
    volumes:
      - graphite-test-data:/opt/graphite/storage
    networks:
      - monitoring-test

volumes:
  grafana-test-data:
  prometheus-test-data:
  grafana-docker-data:
  prometheus-standalone-data:
  mysql-test-data:
  graphite-test-data:

networks:
  monitoring-test:
    driver: bridge
