<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafana Dashboard Toolkit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen" x-data="app()">
    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <h1 class="text-2xl font-bold text-orange-500">Grafana Dashboard Toolkit</h1>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-400" x-text="'Dashboards: ' + stats.dashboards"></span>
                    <button @click="showSettings = true" class="p-2 hover:bg-gray-700 rounded">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="container mx-auto px-4 py-8">
        <!-- Tabs -->
        <div class="flex space-x-1 mb-8 bg-gray-800 p-1 rounded-lg w-fit">
            <button @click="activeTab = 'create'"
                    :class="activeTab === 'create' ? 'bg-orange-600 text-white' : 'text-gray-400 hover:text-white'"
                    class="px-4 py-2 rounded-md transition-colors">
                Create Dashboard
            </button>
            <button @click="activeTab = 'templates'"
                    :class="activeTab === 'templates' ? 'bg-orange-600 text-white' : 'text-gray-400 hover:text-white'"
                    class="px-4 py-2 rounded-md transition-colors">
                Templates
            </button>
            <button @click="activeTab = 'dashboards'"
                    :class="activeTab === 'dashboards' ? 'bg-orange-600 text-white' : 'text-gray-400 hover:text-white'"
                    class="px-4 py-2 rounded-md transition-colors">
                My Dashboards
            </button>
        </div>

        <!-- Create Dashboard Tab -->
        <div x-show="activeTab === 'create'" x-cloak>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- Input Section -->
                <div class="space-y-6">
                    <!-- Method Selection -->
                    <div class="bg-gray-800 rounded-lg p-6">
                        <h3 class="text-lg font-semibold mb-4">Creation Method</h3>
                        <div class="grid grid-cols-3 gap-4">
                            <button @click="createMethod = 'nlp'"
                                    :class="createMethod === 'nlp' ? 'border-orange-500 bg-orange-500/10' : 'border-gray-600 hover:border-gray-500'"
                                    class="border-2 rounded-lg p-4 text-center transition-colors">
                                <div class="text-2xl mb-2">💬</div>
                                <div class="font-medium">Natural Language</div>
                                <div class="text-xs text-gray-400">Describe what you want</div>
                            </button>
                            <button @click="createMethod = 'template'"
                                    :class="createMethod === 'template' ? 'border-orange-500 bg-orange-500/10' : 'border-gray-600 hover:border-gray-500'"
                                    class="border-2 rounded-lg p-4 text-center transition-colors">
                                <div class="text-2xl mb-2">📋</div>
                                <div class="font-medium">Template</div>
                                <div class="text-xs text-gray-400">Start from a template</div>
                            </button>
                            <button @click="createMethod = 'manual'"
                                    :class="createMethod === 'manual' ? 'border-orange-500 bg-orange-500/10' : 'border-gray-600 hover:border-gray-500'"
                                    class="border-2 rounded-lg p-4 text-center transition-colors">
                                <div class="text-2xl mb-2">🛠️</div>
                                <div class="font-medium">Manual</div>
                                <div class="text-xs text-gray-400">Build step by step</div>
                            </button>
                        </div>
                    </div>

                    <!-- NLP Input -->
                    <div x-show="createMethod === 'nlp'" class="bg-gray-800 rounded-lg p-6">
                        <h3 class="text-lg font-semibold mb-4">Describe Your Dashboard</h3>
                        <textarea x-model="nlpPrompt"
                                  rows="4"
                                  placeholder="Create a dashboard showing CPU, memory, and disk usage with alerts for high utilization..."
                                  class="w-full bg-gray-700 border border-gray-600 rounded-lg p-4 text-gray-100 placeholder-gray-400 focus:border-orange-500 focus:outline-none"></textarea>
                        <div class="mt-4 flex items-center space-x-4">
                            <select x-model="datasource" class="bg-gray-700 border border-gray-600 rounded-lg px-4 py-2">
                                <option value="Prometheus">Prometheus</option>
                                <option value="Graphite">Graphite</option>
                                <option value="InfluxDB">InfluxDB</option>
                                <option value="Loki">Loki</option>
                            </select>
                            <button @click="generateFromNLP()"
                                    :disabled="loading"
                                    class="bg-orange-600 hover:bg-orange-700 disabled:opacity-50 px-6 py-2 rounded-lg font-medium transition-colors">
                                <span x-show="!loading">Generate Dashboard</span>
                                <span x-show="loading">Generating...</span>
                            </button>
                        </div>
                    </div>

                    <!-- Template Selection -->
                    <div x-show="createMethod === 'template'" class="bg-gray-800 rounded-lg p-6">
                        <h3 class="text-lg font-semibold mb-4">Select Template</h3>
                        <select x-model="selectedTemplate" @change="loadTemplateInfo()"
                                class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 mb-4">
                            <option value="">-- Select a template --</option>
                            <template x-for="t in templates" :key="t.name">
                                <option :value="t.name" x-text="t.name + ' - ' + t.description"></option>
                            </template>
                        </select>

                        <div x-show="selectedTemplate" class="space-y-4">
                            <div>
                                <label class="block text-sm text-gray-400 mb-1">Datasource</label>
                                <select x-model="datasource" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2">
                                    <option value="Prometheus">Prometheus</option>
                                    <option value="Graphite">Graphite</option>
                                    <option value="InfluxDB">InfluxDB</option>
                                </select>
                            </div>
                            <button @click="createFromTemplate()"
                                    :disabled="loading"
                                    class="bg-orange-600 hover:bg-orange-700 disabled:opacity-50 px-6 py-2 rounded-lg font-medium transition-colors">
                                Create Dashboard
                            </button>
                        </div>
                    </div>

                    <!-- Manual Builder -->
                    <div x-show="createMethod === 'manual'" class="bg-gray-800 rounded-lg p-6">
                        <h3 class="text-lg font-semibold mb-4">Dashboard Builder</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm text-gray-400 mb-1">Title</label>
                                <input type="text" x-model="manualDashboard.title"
                                       class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:border-orange-500 focus:outline-none">
                            </div>
                            <div>
                                <label class="block text-sm text-gray-400 mb-1">Datasource</label>
                                <select x-model="datasource" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2">
                                    <option value="Prometheus">Prometheus</option>
                                    <option value="Graphite">Graphite</option>
                                    <option value="InfluxDB">InfluxDB</option>
                                </select>
                            </div>

                            <!-- Panels -->
                            <div>
                                <div class="flex justify-between items-center mb-2">
                                    <label class="text-sm text-gray-400">Panels</label>
                                    <button @click="addPanel()" class="text-orange-500 hover:text-orange-400 text-sm">+ Add Panel</button>
                                </div>
                                <template x-for="(panel, index) in manualDashboard.panels" :key="index">
                                    <div class="bg-gray-700 rounded-lg p-4 mb-2">
                                        <div class="flex justify-between mb-2">
                                            <input type="text" x-model="panel.title" placeholder="Panel title"
                                                   class="bg-gray-600 border border-gray-500 rounded px-2 py-1 text-sm">
                                            <button @click="manualDashboard.panels.splice(index, 1)" class="text-red-400 hover:text-red-300 text-sm">Remove</button>
                                        </div>
                                        <input type="text" x-model="panel.query" placeholder="PromQL query"
                                               class="w-full bg-gray-600 border border-gray-500 rounded px-2 py-1 text-sm font-mono">
                                        <select x-model="panel.type" class="mt-2 bg-gray-600 border border-gray-500 rounded px-2 py-1 text-sm">
                                            <option value="timeseries">Time Series</option>
                                            <option value="stat">Stat</option>
                                            <option value="gauge">Gauge</option>
                                            <option value="table">Table</option>
                                        </select>
                                    </div>
                                </template>
                            </div>

                            <button @click="createManual()"
                                    :disabled="loading"
                                    class="bg-orange-600 hover:bg-orange-700 disabled:opacity-50 px-6 py-2 rounded-lg font-medium transition-colors">
                                Create Dashboard
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Preview Section -->
                <div class="bg-gray-800 rounded-lg p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-semibold">Preview</h3>
                        <div x-show="previewJson" class="space-x-2">
                            <button @click="copyJson()" class="text-sm text-gray-400 hover:text-white">Copy JSON</button>
                            <button @click="downloadJson()" class="text-sm text-gray-400 hover:text-white">Download</button>
                            <button @click="saveDashboard()" class="text-sm bg-green-600 hover:bg-green-700 px-3 py-1 rounded">Save</button>
                        </div>
                    </div>
                    <div x-show="!previewJson" class="text-gray-500 text-center py-16">
                        Dashboard preview will appear here
                    </div>
                    <div x-show="previewJson">
                        <div class="mb-4 flex items-center space-x-4 text-sm">
                            <span class="text-gray-400">Title: <span class="text-white" x-text="previewTitle"></span></span>
                            <span class="text-gray-400">Panels: <span class="text-white" x-text="previewPanelCount"></span></span>
                        </div>
                        <pre class="bg-gray-900 rounded-lg p-4 overflow-auto max-h-96 text-sm"><code class="language-json" x-html="highlightedJson"></code></pre>
                    </div>
                </div>
            </div>
        </div>

        <!-- Templates Tab -->
        <div x-show="activeTab === 'templates'" x-cloak>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <template x-for="t in templates" :key="t.name">
                    <div class="bg-gray-800 rounded-lg p-6 hover:bg-gray-750 transition-colors">
                        <h3 class="text-lg font-semibold mb-2" x-text="t.name"></h3>
                        <p class="text-gray-400 text-sm mb-4" x-text="t.description"></p>
                        <div class="flex flex-wrap gap-2 mb-4">
                            <template x-for="tag in t.tags" :key="tag">
                                <span class="bg-gray-700 px-2 py-1 rounded text-xs" x-text="tag"></span>
                            </template>
                        </div>
                        <div class="flex space-x-2">
                            <button @click="useTemplate(t.name)"
                                    class="bg-orange-600 hover:bg-orange-700 px-4 py-2 rounded text-sm">
                                Use Template
                            </button>
                            <button @click="previewTemplate(t.name)"
                                    class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded text-sm">
                                Preview
                            </button>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- Dashboards Tab -->
        <div x-show="activeTab === 'dashboards'" x-cloak>
            <div class="mb-6">
                <input type="text" x-model="searchQuery" @input="searchDashboards()"
                       placeholder="Search dashboards..."
                       class="w-full max-w-md bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:border-orange-500 focus:outline-none">
            </div>

            <div x-show="dashboards.length === 0" class="text-center text-gray-500 py-16">
                No dashboards found. Create your first one!
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <template x-for="d in dashboards" :key="d.uid">
                    <div class="bg-gray-800 rounded-lg p-6 hover:bg-gray-750 transition-colors">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-lg font-semibold" x-text="d.title"></h3>
                            <button @click="deleteDashboard(d.uid)" class="text-red-400 hover:text-red-300">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                </svg>
                            </button>
                        </div>
                        <p class="text-gray-400 text-sm mb-2" x-text="d.description || 'No description'"></p>
                        <div class="text-xs text-gray-500 mb-4">
                            <span x-text="'Updated: ' + new Date(d.updated_at).toLocaleDateString()"></span>
                            <span x-show="d.template_name" x-text="' • Template: ' + d.template_name"></span>
                        </div>
                        <div class="flex flex-wrap gap-2 mb-4">
                            <template x-for="tag in d.tags" :key="tag">
                                <span class="bg-gray-700 px-2 py-1 rounded text-xs" x-text="tag"></span>
                            </template>
                        </div>
                        <div class="flex space-x-2">
                            <button @click="viewDashboard(d.uid)"
                                    class="bg-orange-600 hover:bg-orange-700 px-4 py-2 rounded text-sm">
                                View JSON
                            </button>
                            <button @click="exportDashboard(d.uid)"
                                    class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded text-sm">
                                Export
                            </button>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div x-show="showSettings" x-cloak class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-gray-800 rounded-lg p-6 w-full max-w-md" @click.away="showSettings = false">
            <h2 class="text-xl font-semibold mb-4">Settings</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Default Datasource</label>
                    <input type="text" x-model="settings.defaultDatasource"
                           class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">OpenAI API Key (for NLP)</label>
                    <input type="password" x-model="settings.openaiKey"
                           class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2">
                </div>
            </div>
            <div class="flex justify-end mt-6 space-x-2">
                <button @click="showSettings = false" class="px-4 py-2 text-gray-400 hover:text-white">Cancel</button>
                <button @click="saveSettings()" class="bg-orange-600 hover:bg-orange-700 px-4 py-2 rounded">Save</button>
            </div>
        </div>
    </div>

    <script>
        function app() {
            return {
                activeTab: 'create',
                createMethod: 'nlp',
                loading: false,
                showSettings: false,

                // Data
                templates: [],
                dashboards: [],
                stats: { dashboards: 0 },

                // Form state
                nlpPrompt: '',
                datasource: 'Prometheus',
                selectedTemplate: '',
                searchQuery: '',

                manualDashboard: {
                    title: 'My Dashboard',
                    panels: []
                },

                // Preview
                previewJson: null,
                previewTitle: '',
                previewPanelCount: 0,
                highlightedJson: '',

                // Settings
                settings: {
                    defaultDatasource: 'Prometheus',
                    openaiKey: ''
                },

                async init() {
                    await this.loadTemplates();
                    await this.loadDashboards();
                    await this.loadStats();
                },

                async loadTemplates() {
                    const res = await fetch('/api/templates');
                    const data = await res.json();
                    this.templates = data.templates;
                },

                async loadDashboards() {
                    const res = await fetch('/api/dashboards');
                    const data = await res.json();
                    this.dashboards = data.dashboards;
                },

                async loadStats() {
                    const res = await fetch('/api/stats');
                    this.stats = await res.json();
                },

                async generateFromNLP() {
                    this.loading = true;
                    try {
                        const res = await fetch('/api/generate', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                prompt: this.nlpPrompt,
                                datasource: this.datasource
                            })
                        });
                        const data = await res.json();
                        this.setPreview(data);
                    } catch (e) {
                        alert('Error generating dashboard');
                    }
                    this.loading = false;
                },

                async createFromTemplate() {
                    this.loading = true;
                    try {
                        const res = await fetch(`/api/templates/${this.selectedTemplate}/preview`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ datasource: this.datasource })
                        });
                        const data = await res.json();
                        this.setPreview(data);
                    } catch (e) {
                        alert('Error creating dashboard');
                    }
                    this.loading = false;
                },

                async createManual() {
                    this.loading = true;
                    try {
                        const res = await fetch('/api/dashboards', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                source: 'sdk',
                                title: this.manualDashboard.title,
                                datasource: this.datasource,
                                panels: this.manualDashboard.panels
                            })
                        });
                        const data = await res.json();
                        this.setPreview({ title: data.title, json: data.json, panels: data.json.panels.length });
                        await this.loadDashboards();
                        await this.loadStats();
                    } catch (e) {
                        alert('Error creating dashboard');
                    }
                    this.loading = false;
                },

                setPreview(data) {
                    this.previewJson = data.json;
                    this.previewTitle = data.title;
                    this.previewPanelCount = data.panels;
                    this.highlightedJson = hljs.highlight(JSON.stringify(data.json, null, 2), { language: 'json' }).value;
                },

                addPanel() {
                    this.manualDashboard.panels.push({
                        title: 'New Panel',
                        query: '',
                        type: 'timeseries'
                    });
                },

                useTemplate(name) {
                    this.activeTab = 'create';
                    this.createMethod = 'template';
                    this.selectedTemplate = name;
                },

                async previewTemplate(name) {
                    const res = await fetch(`/api/templates/${name}/preview`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ datasource: this.datasource })
                    });
                    const data = await res.json();
                    this.activeTab = 'create';
                    this.setPreview(data);
                },

                async viewDashboard(uid) {
                    const res = await fetch(`/api/dashboards/${uid}`);
                    const data = await res.json();
                    this.activeTab = 'create';
                    this.setPreview({ title: data.title, json: data.json_data, panels: data.json_data.panels.length });
                },

                async deleteDashboard(uid) {
                    if (!confirm('Delete this dashboard?')) return;
                    await fetch(`/api/dashboards/${uid}`, { method: 'DELETE' });
                    await this.loadDashboards();
                    await this.loadStats();
                },

                async exportDashboard(uid) {
                    const res = await fetch(`/api/dashboards/${uid}/export`);
                    const data = await res.json();
                    this.downloadFile(JSON.stringify(data, null, 2), `dashboard-${uid}.json`);
                },

                async saveDashboard() {
                    if (!this.previewJson) return;
                    const res = await fetch('/api/dashboards', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            source: 'sdk',
                            title: this.previewJson.title,
                            datasource: this.datasource,
                            panels: this.previewJson.panels
                        })
                    });
                    await this.loadDashboards();
                    await this.loadStats();
                    alert('Dashboard saved!');
                },

                async searchDashboards() {
                    const res = await fetch(`/api/dashboards?search=${encodeURIComponent(this.searchQuery)}`);
                    const data = await res.json();
                    this.dashboards = data.dashboards;
                },

                copyJson() {
                    navigator.clipboard.writeText(JSON.stringify(this.previewJson, null, 2));
                },

                downloadJson() {
                    this.downloadFile(JSON.stringify(this.previewJson, null, 2), `${this.previewTitle || 'dashboard'}.json`);
                },

                downloadFile(content, filename) {
                    const blob = new Blob([content], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    a.click();
                    URL.revokeObjectURL(url);
                },

                saveSettings() {
                    localStorage.setItem('agt-settings', JSON.stringify(this.settings));
                    this.showSettings = false;
                },

                loadTemplateInfo() {
                    // Template info is already in the templates array
                }
            }
        }
    </script>
</body>
</html>
